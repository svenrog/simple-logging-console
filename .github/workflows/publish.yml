name: Publish NuGet package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # enable GitHub OIDC token issuance for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test SimpleLogFormatter.slnx -c Release

      - name: Build & pack Simple.Logging.Console
        run: dotnet build src/Simple.Logging.Console/Simple.Logging.Console.csproj -c Release

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push src/Simple.Logging.Console/bin/Release/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
